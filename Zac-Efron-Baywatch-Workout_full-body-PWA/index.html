  .day-tab.active { background:#141414; }
  .day-tab .sub { font-size:12px; font-family:Georgia,serif; font-weight:700; margin-top:2px; color:#777; }
  .day-tab.active .sub { color:#f0ede8; }

  .day-head { padding:22px 20px 12px; }

  .rest-chip { padding:5px 10px; background:transparent; border:1px solid #2a2a2a; border-radius:6px; color:#666; font-size:10px; }
  .rest-chip.active { border-color: var(--accent); color: var(--accent); background: color-mix(in srgb, var(--accent) 13%, transparent); }

  .ss-card.done { border-color: color-mix(in srgb, var(--accent) 33%, transparent); }
  .ss-summary { display:grid; grid-template-columns:34px 1fr auto 20px; gap:10px; align-items:center; padding:14px 16px; }
  .ss-num { font-size:10px; font-weight:700; border-radius:6px; padding:5px 0; text-align:center; color:var(--accent); border:1px solid color-mix(in srgb, var(--accent) 27%, transparent); }

  .letter-tag { color: var(--accent); font-size:10px; margin-right:4px; }
  .plus { color:#444; margin:0 4px; }

  .ex-meta { font-size:10px; color:#555; white-space:nowrap; }
  .ex-note { font-size:11px; color:#666; font-style:italic; margin-bottom:8px; }
  .grid-head { display:grid; grid-template-columns:26px 1fr 1fr 36px; gap:6px; margin-bottom:4px; }
  .grid-head span { font-size:9px; color:#444; letter-spacing:1px; }
  .set-row { display:grid; grid-template-columns:26px 1fr 1fr 36px; gap:6px; align-items:center; margin-bottom:6px; }
  .set-idx { font-size:13px; color:#555; }

  .set-input { background:#1c1c1c; border:1px solid #2a2a2a; border-radius:6px; color:#f0ede8; font-size:13px; padding:7px 6px; width:100%; text-align:center; outline:none; }
  .set-input.done { border-color: color-mix(in srgb, var(--accent) 27%, transparent); }
  .done-btn { width:32px; height:32px; border-radius:8px; border:1px solid #2a2a2a; background:transparent; color:#444; display:flex; align-items:center; justify-content:center; font-size:15px; }
  .done-btn.done { background: var(--accent); border-color: var(--accent); color:#0a0a0a; }
  .no-rest-hint { text-align:center; font-size:9px; color:#3a3a3a; letter-spacing:2px; margin:6px 0 2px; }
  .ss-notes-label { font-size:9px; letter-spacing:3px; color:#444; margin-bottom:6px; }
  .ss-notes { width:100%; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; color:#ccc; font-size:12px; padding:8px 10px; min-height:48px; resize:vertical; outline:none; }
  .ss-footer { margin-top:10px; display:flex; align-items:center; gap:10px; }
  .ss-footer .track { height:2px; background:#1e1e1e; border-radius:2px; }
  .ss-footer .fill { height:100%; border-radius:2px; background:var(--accent); transition:width .3s; }
  .ss-footer .lbl { font-size:10px; color:#555; margin-top:4px; }
  .ss-footer .totlbl { font-size:11px; color:var(--accent); font-weight:700; text-align:right; }
  .ss-footer .totsub { font-size:9px; color:#555; text-align:right; }

  .section { padding:32px 20px 0; }
  .section-title { font-size:10px; letter-spacing:4px; color:#555; margin-bottom:10px; }
  .week-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
  .week-day { padding:8px 3px; text-align:center; border-radius:6px; background:#0d0d0d; border:1px solid #181818; }

  .week-day .t { font-size:10px; font-weight:700; margin-top:3px; color:#333; }

  .principle-card { padding:14px; background:#111; border:1px solid #1e1e1e; border-radius:10px; }
  .principle-card .ic { margin-bottom:6px; font-size:18px; }
  .principle-card .lb { font-weight:700; font-size:12px; margin-bottom:3px; }
  .principle-card .tx { font-size:11px; color:#777; line-height:1.5; }

  .footer-note { margin:36px 20px 0; padding:14px; border-top:1px solid #1a1a1a; font-size:9px; color:#3a3a3a; letter-spacing:2px; text-align:center; padding-bottom:24px; }

  /* log tab */
  .log-header { border-bottom:3px solid var(--accent); padding:28px 20px 18px; }
  .log-body { padding:16px 12px 40px; }
  .view-toggle { display:flex; gap:6px; margin-bottom:16px; }
  .view-btn { flex:1; padding:9px; background:transparent; border:1px solid #1e1e1e; border-radius:8px; color:#555; font-size:11px; letter-spacing:1px; display:flex; align-items:center; justify-content:center; gap:6px; }
  .view-btn.active { background:#1c1c1c; border-color:#333; color:#f0ede8; }
  .filter-row { display:flex; gap:6px; margin-bottom:16px; overflow-x:auto; scrollbar-width:none; }
  .filter-chip { padding:6px 12px; border-radius:20px; border:1px solid #222; background:transparent; color:#555; font-size:10px; letter-spacing:1px; white-space:nowrap; }
  .filter-chip.active { border-color:#555; background:#1c1c1c; color:#f0ede8; }
  .filter-chip.day-active { color: var(--chipcolor); border-color: var(--chipcolor); background: color-mix(in srgb, var(--chipcolor) 13%, transparent); }
  .empty-state { padding:60px 24px; text-align:center; color:#666; }
  .empty-state .big { font-size:11px; letter-spacing:4px; color:#444; margin-bottom:10px; }
  .session-card { margin-bottom:14px; border-radius:10px; overflow:hidden; border:1px solid #222; }
  .session-head { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
  .session-day { font-size:9px; letter-spacing:2px; }
  .session-date { font-size:13px; font-weight:700; }
  .session-vol { font-size:13px; font-weight:700; }
  .session-sets { font-size:10px; color:#555; }
  .session-prs { font-size:10px; color:#FFD700; }
  .session-body { padding:12px 16px; }
  .sess-ex { margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid #1a1a1a; }
  .sess-ex-head { display:flex; justify-content:space-between; align-items:center; }
  .sess-sets { display:flex; gap:5px; flex-wrap:wrap; margin-top:6px; }
  .sess-set-chip { padding:4px 10px; background:#161616; border:1px solid #262626; border-radius:6px; font-size:11px; color:#aaa; }
  .sess-set-chip.pr { background:#2a2400; border-color:#FFD70055; color:#FFD700; }
  .clear-btn { width:100%; padding:12px; background:transparent; border:1px solid #2a1414; border-radius:8px; color:#883333; font-size:10px; letter-spacing:2px; margin-top:6px; }

  .chart-day-row, .chart-ex-list { display:flex; gap:5px; margin-bottom:16px; overflow-x:auto; scrollbar-width:none; }
  .chart-day-chip { flex:1 0 auto; min-width:90px; padding:8px; border-radius:8px; border:1px solid #222; background:transparent; color:#666; font-size:10px; letter-spacing:1px; }
  .chart-day-chip.active { border-color: var(--chipcolor); background: color-mix(in srgb, var(--chipcolor) 10%, transparent); color: var(--chipcolor); }
  .chart-ex-list { flex-direction:column; }
  .chart-ex-btn { padding:8px 12px; background:transparent; border:1px solid #1e1e1e; border-radius:6px; color:#888; font-size:12px; text-align:left; }
  .chart-ex-btn.active { border-color: var(--chipcolor); background: color-mix(in srgb, var(--chipcolor) 10%, transparent); color: var(--chipcolor); }
  .chart-box { border-radius:8px; padding:16px; margin-bottom:12px; border:1px solid #222; background:#111; }
  .chart-box .lbl { font-size:9px; letter-spacing:3px; color:#555; margin-bottom:6px; }
  .chart-box .big { font-size:22px; font-weight:900; margin-bottom:6px; }
  .chart-box .row { display:flex; justify-content:space-between; margin-top:6px; }
  .chart-box .row span { font-size:9px; color:#444; }
  .chart-delta { margin-top:8px; font-size:11px; }

  /* bottom nav */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:900; background:rgba(8,8,8,0.97); backdrop-filter:blur(10px);
    border-top:1px solid #1a1a1a; display:flex; padding-bottom: env(safe-area-inset-bottom); }
  .nav-btn { flex:1; padding:12px; background:transparent; border:none; color:#555; display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9px; letter-spacing:1px; position:relative; }
  .nav-btn.active { color: var(--accent); }
  .nav-ic { font-size:18px; }
  .nav-badge { position:absolute; top:6px; right:calc(50% - 22px); background:var(--accent); color:#0a0a0a; border-radius:20px; font-size:8px; font-weight:900; padding:1px 5px; }

  /* rest timer floating */
  .rest-float { position:fixed; bottom:74px; left:50%; transform:translateX(-50%); z-index:1500; width:92%; max-width:360px;
    background:#141414; border:1px solid color-mix(in srgb, var(--accent) 27%, transparent); border-radius:14px; padding:14px 16px; box-shadow:0 8px 30px rgba(0,0,0,0.6); }

  .ring-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }

  .ring-time { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; }
  .rest-info { flex:1; min-width:0; }
  .rest-info .lbl { font-size:9px; color:#555; letter-spacing:2px; }

  .rest-adjust { display:flex; gap:6px; margin-top:4px; }
  .adj-btn { padding:3px 9px; background:#1e1e1e; border:1px solid #2a2a2a; border-radius:6px; color:#aaa; font-size:11px; }
  .rest-close { background:transparent; border:none; color:#555; }
  .rest-controls { display:flex; gap:8px; margin-top:12px; }

  .rest-controls .skip { flex:0; padding:9px 14px; background:transparent; color:#888; }

  .overlay { position:fixed; inset:0; z-index:2000; background:rgba(0,0,0,0.93); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; text-align:center; overflow-y:auto; }
  .overlay .trophy { font-size:52px; margin-bottom:12px; }
  .overlay .eyebrow2 { font-size:11px; letter-spacing:6px; margin-bottom:6px; }

  .overlay .tag { color:#666; font-size:12px; margin-bottom:24px; }

  .color-head { position:sticky; top:0; background:rgba(10,10,10,0.97); backdrop-filter:blur(8px); padding:18px 16px;
    display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #1e1e1e; }
  .color-body { padding:20px 16px; }
  .color-daytabs { display:flex; gap:5px; margin-bottom:24px; }

  .done-color-btn { padding:10px 20px; background:#f0ede8; border:none; border-radius:8px; color:#0a0a0a; font-weight:700; font-size:13px; }

// ── State ────────────────────────────────────────────────────────
function buildInitialLog() {
  const log = {};
  PROGRAM.forEach((day, di) => day.exercises.forEach((ex, ei) => {
    for (let s = 0; s < ex.sets; s++) log[`${di}-${ei}-${s}`] = { weight:"", reps:"", done:false };
  }));
  return log;
}

function loadPersisted() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}

const persisted = loadPersisted();

const state = {
  activeTab: "workout",
  activeDay: 0,
  expandedSS: "0-0",
  log: (persisted && persisted.log) || buildInitialLog(),
  notes: (persisted && persisted.notes) || {},
  restDuration: (persisted && persisted.restDuration) || 60,
  restRemaining: null,
  restRunning: false,

  colors: (persisted && persisted.colors) || [...DEFAULT_COLORS],

  colorEditing: 0,
  logView: "sessions",
  logFilter: null,
  chartDay: 0,

};

let saveTimer = null;
function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        log: state.log, notes: state.notes, restDuration: state.restDuration,
        history: state.history, prs: state.prs, colors: state.colors,
      }));
    } catch (e) {}
  }, 300);
}

// ── Helpers ──────────────────────────────────────────────────────
function fmt(s) { const m = Math.floor(s/60), sec = s%60; return `${m}:${String(sec).padStart(2,"0")}`; }

function calcVolume(di, ei, sets) {
  let t = 0;
  for (let s = 0; s < sets; s++) {
    const e = state.log[`${di}-${ei}-${s}`];
    const w = parseFloat(e?.weight) || 0, r = parseFloat(e?.reps) || 0;
    t += w * r;
  }
  return t;
}

function getExProgress(di, ei, sets) {
  let n = 0;
  for (let s = 0; s < sets; s++) if (state.log[`${di}-${ei}-${s}`]?.done) n++;
  return n;
}

function isSetPR(di, ei, key) {
  const prKey = `${di}-${ei}`;
  const w = parseFloat(state.log[key]?.weight) || 0;
  const existing = state.prs[prKey];
  return w>0 && existing && w>=existing.weight && state.log[key]?.done;
}

function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const cfgs = type === "done"
      ? [{f:880,s:0,d:.12},{f:880,s:.18,d:.12},{f:1100,s:.36,d:.22}]
      : [{f:660,s:0,d:.08}];
    cfgs.forEach(({f,s,d}) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type = "sine"; o.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime+s);
      g.gain.linearRampToValueAtTime(.35, ctx.currentTime+s+.01);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime+s+d);
      o.start(ctx.currentTime+s); o.stop(ctx.currentTime+s+d+.05);
    });
    setTimeout(() => ctx.close(), 1000);
  } catch (_) {}
}

// ── Small render helpers ────────────────────────────────────────
function ringSVG(radius, progress, colorHex, label) {
  const stroke = 5, norm = radius - stroke, circ = 2 * Math.PI * norm;
  const offset = circ * (1 - Math.max(0, Math.min(1, progress || 0)));
  return `<div class="ring-wrap" style="width:${radius*2}px;height:${radius*2}px">
    <svg width="${radius*2}" height="${radius*2}">
      <circle cx="${radius}" cy="${radius}" r="${norm}" fill="none" stroke="#1e1e1e" stroke-width="${stroke}"/>
      <circle cx="${radius}" cy="${radius}" r="${norm}" fill="none" stroke="${colorHex}" stroke-width="${stroke}"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset .5s linear"/>
    </svg>
    <div class="ring-time" style="color:${colorHex}">${label}</div>
  </div>`;
}

function sparklineSVG(data, colorHex, width=260, height=50) {
  if (!data || data.length < 2) return "";
  const min = Math.min(...data), max = Math.max(...data), range = max-min || 1;
  const pts = data.map((v,i) => {
    const x = (i/(data.length-1)) * width;
    const y = height - ((v-min)/range) * (height-8) - 4;
    return `${x},${y}`;
  }).join(" ");
  const dots = data.map((v,i) => {
    const x = (i/(data.length-1)) * width;
    const y = height - ((v-min)/range) * (height-8) - 4;
    return `<circle cx="${x}" cy="${y}" r="3" fill="${colorHex}"/>`;
  }).join("");
  return `<svg width="${width}" height="${height}" style="overflow:visible">
    <polyline points="${pts}" fill="none" stroke="${colorHex}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
  </svg>`;
}

function pillHTML(label, colorHex) {
  return `<span class="pill" style="--accent:${colorHex}">${esc(label.toUpperCase())}</span>`;
}

function renderSupersetCard(di, day, aIdx, bIdx, color) {
  const exA = day.exercises[aIdx], exB = day.exercises[bIdx];
  const si = exA.si;
  const ssKey = `${di}-${si}`;
  const isOpen = state.expandedSS === ssKey;
  const doneA = getExProgress(di, aIdx, exA.sets), doneB = getExProgress(di, bIdx, exB.sets);
  const totalPairSets = exA.sets + exB.sets;
  const doneSets = doneA + doneB;
  const allDone = doneSets === totalPairSets;
  const vol = calcVolume(di, aIdx, exA.sets) + calcVolume(di, bIdx, exB.sets);
  const hasPR = Array.from({length:exA.sets},(_,s) => state.log[`${di}-${aIdx}-${s}`]?.isPR).some(Boolean)
    || Array.from({length:exB.sets},(_,s) => state.log[`${di}-${bIdx}-${s}`]?.isPR).some(Boolean);

  let body = "";
  if (isOpen) {
    body = `<div class="ss-body">`;
    [{ex:exA, idx:aIdx},{ex:exB, idx:bIdx}].forEach(({ex, idx}, half) => {
      body += `<div class="ex-block">
        <div class="ex-row-head">
          <div class="ex-name"><span class="letter-tag mono" style="color:${color}">${si+1}${ex.letter}</span>${esc(ex.name)}</div>
          <div class="ex-meta mono">${esc(ex.reps)} reps · ${ex.sets} sets</div>
        </div>
        <div class="ex-note">${esc(ex.note)}</div>
        <div class="grid-head mono"><span>SET</span><span>WEIGHT</span><span>REPS</span><span>DONE</span></div>
        ${Array.from({length:ex.sets},(_,s) => {
          const logKey = `${di}-${idx}-${s}`;
          const entry = state.log[logKey];
          const isPR = isSetPR(di, idx, logKey);
          return `<div class="set-row">
            <span class="set-idx mono ${isPR?"pr":""}" style="${isPR?"":`color:#555`}">${s+1}</span>
            <input class="set-input mono ${entry.done?"done":""}" style="${entry.done?`border-color:${color}44`:""}" type="number" inputmode="decimal" placeholder="lbs"
              value="${esc(entry.weight)}" data-key="w-${logKey}" data-role="setfield" data-field="weight" data-logkey="${logKey}">
            <input class="set-input mono ${entry.done?"done":""}" style="${entry.done?`border-color:${color}44`:""}" type="number" inputmode="decimal" placeholder="reps"
              value="${esc(entry.reps)}" data-key="r-${logKey}" data-role="setfield" data-field="reps" data-logkey="${logKey}">
            <button class="done-btn ${entry.done?"done":""}" style="${entry.done?`background:${color};border-color:${color}`:""}"
              data-action="toggle-done" data-logkey="${logKey}" data-label="${esc(si+1)}${exA.letter}/${esc(si+1)}${exB.letter} · Round ${s+1}" data-di="${di}" data-ei="${idx}" data-s="${s}">${entry.done?"✓":""}</button>
          </div>`;
        }).join("")}
        ${half===0 ? `<div class="no-rest-hint mono">↓ NO REST — STRAIGHT INTO B ↓</div>` : ""}
      </div>`;
    });
    body += `
      <div style="margin-top:12px">
        <div class="ss-notes-label mono">SUPERSET NOTES</div>
        <textarea class="ss-notes" placeholder="How did this pair feel? Increase weight next time?" data-key="n-${ssKey}" data-role="notefield" data-noteskey="${ssKey}">${esc(state.notes[ssKey]||"")}</textarea>
      </div>
      <div class="ss-footer">
        <div style="flex:1">
          <div class="track"><div class="fill" style="width:${(doneSets/totalPairSets)*100}%;background:${color}"></div></div>
          <div class="lbl mono">${doneSets}/${totalPairSets} sets</div>
        </div>
        ${vol>0 ? `<div><div class="totlbl mono" style="color:${color}">${Math.round(vol)}</div><div class="totsub mono">TOTAL LB</div></div>` : ""}
      </div>
    </div>`;
  }

  return `<div class="ss-card ${allDone?"done":""}" style="${allDone?`border-color:${color}55`:""}" id="ss-${ssKey}">
    <div class="ss-summary" data-action="toggle-ss" data-key="${ssKey}">
      <span class="ss-num mono ${hasPR?"pr":""}" style="${hasPR?"":`color:${color};border-color:${color}44`}">${si+1}</span>

        </div>
        <div class="pills">${[...exA.muscles, ...exB.muscles].slice(0,4).map(m => pillHTML(m, color)).join("")}</div>
      </div>
      <div class="ss-side">
        <div class="frac mono" style="color:${color}">${doneSets}/${totalPairSets}</div>
        ${vol>0 ? `<div class="vol mono">${Math.round(vol)} lb</div>` : ""}
      </div>

function renderHistoryBody() {
  if (state.history.length === 0) {
    return `<div class="empty-state">

      <div class="big mono">NO SESSIONS YET</div>

  if (state.logView === "sessions") {
    const filtered = [...state.history].reverse().filter(s => state.logFilter===null || s.dayIndex===state.logFilter);
    html += `<div class="filter-row">
      <button class="filter-chip mono ${state.logFilter===null?"active":""}" data-action="log-filter" data-day="all">ALL</button>

    </div>`;
    if (filtered.length===0) html += `<div style="text-align:center;padding:32px;color:#555" class="mono">NO SESSIONS FOR THIS DAY</div>`;
    filtered.forEach((session, si) => {
      const dayColor = state.colors[session.dayIndex];
      const prevSession = filtered.find((_, idx) => idx>si && _.dayIndex===session.dayIndex);
      html += `<div class="session-card" style="border-color:${dayColor}33">
        <div class="session-head" style="background:${dayColor}18;border-bottom:1px solid ${dayColor}33">
          <div>
            <div class="session-day mono" style="color:${dayColor}">${esc(PROGRAM[session.dayIndex].title)}</div>
            <div class="session-date">${esc(session.date)}</div>
          </div>
          <div style="text-align:right">
            ${session.totalVolume>0 ? `<div class="session-vol mono" style="color:${dayColor}">${Math.round(session.totalVolume).toLocaleString()}</div>` : ""}
            <div class="session-sets mono">${session.setsCompleted} sets</div>
            ${session.prs>0 ? `<div class="session-prs mono">${session.prs} PR${session.prs>1?"s":""}</div>` : ""}
          </div>
        </div>
        <div class="session-body">
          ${session.exercises.map((ex, ei) => {
            if (!ex.sets.some(s => s.done)) return "";
            const prevEx = prevSession?.exercises[ei];
            const vol = ex.sets.reduce((a,s) => a+((parseFloat(s.weight)||0)*(parseFloat(s.reps)||0)), 0);
            const prevVol = prevEx?.sets.reduce((a,s) => a+((parseFloat(s.weight)||0)*(parseFloat(s.reps)||0)), 0) || 0;
            const diff = vol - prevVol;
            return `<div class="sess-ex">
              <div class="sess-ex-head">
                <div style="font-size:13px;font-weight:700"><span class="mono" style="color:${dayColor};font-size:10px;margin-right:6px">${ex.si+1}${ex.letter}</span>${esc(ex.name)}${ex.isPR?" ★":""}</div>
                <div style="display:flex;align-items:center;gap:6px">
                  ${prevVol>0 && vol>0 ? `<span class="mono" style="font-size:11px;color:${diff>0?"#2EBF7A":diff<0?"#E84A2E":"#555"}">${diff>0?"▲":diff<0?"▼":"—"}${diff!==0?Math.abs(Math.round(diff)):""}</span>` : ""}
                  ${vol>0 ? `<span class="mono" style="font-size:11px;color:#666">${Math.round(vol)}</span>` : ""}
                </div>

              <div class="sess-sets">

  } else {

    const chartExInfo = PROGRAM[chartDay].exercises[chartEx];
    const chartExLabel = `${chartExInfo.si+1}${chartExInfo.letter} ${chartExInfo.name}`;
    const chartData = chartSessions.map(s => {
      const ex = s.exercises[chartEx]; if (!ex) return null;
      const doneW = ex.sets.filter(st => st.done && parseFloat(st.weight)>0).map(st => parseFloat(st.weight));
      const maxW = doneW.length ? Math.max(...doneW) : 0;
      return maxW>0 ? maxW : null;
    }).filter(v => v!==null);
    const volumeData = chartSessions.map(s => {
      const ex = s.exercises[chartEx]; if (!ex) return null;
      const vol = ex.sets.reduce((a,st) => a+((parseFloat(st.weight)||0)*(parseFloat(st.reps)||0)),0);
      return vol>0 ? vol : null;
    }).filter(v => v!==null);

    html += `<div class="section-title mono">DAY</div>
    <div class="chart-day-row">
      ${PROGRAM.map((d,i) => `<button class="chart-day-chip mono ${chartDay===i?"active":""}" style="--chipcolor:${state.colors[i]}" data-action="chart-day" data-day="${i}">${esc(d.title)}</button>`).join("")}
    </div>
    <div class="section-title mono">EXERCISE</div>
    <div class="chart-ex-list">
      ${PROGRAM[chartDay].exercises.map((ex,i) => `<button class="chart-ex-btn mono ${chartEx===i?"active":""}" style="--chipcolor:${color}" data-action="chart-ex" data-ex="${i}">${ex.si+1}${ex.letter} · ${esc(ex.name)}</button>`).join("")}
    </div>`;

    if (chartData.length<2) {
      html += `<div style="text-align:center;padding:32px;color:#555" class="mono">Need at least 2 logged sessions of ${esc(chartExLabel)} to show a trend.</div>`;
    } else {
      const last = chartData[chartData.length-1], first = chartData[0];
      html += `<div class="chart-box">
        <div class="lbl mono">TOP WEIGHT</div>
        <div class="big mono" style="color:${color}">${last}</div>
        ${sparklineSVG(chartData, color)}
        <div class="row"><span class="mono">SESSION 1</span><span class="mono">LATEST</span></div>
        <div class="chart-delta mono" style="color:${last>=first?"#2EBF7A":"#E84A2E"}">${last>first?`▲ +${Math.round(last-first)}`:last<first?`▼ ${Math.round(last-first)}`:"— steady"}</div>
      </div>`;
      if (volumeData.length>=2) {
        html += `<div class="chart-box">
          <div class="lbl mono">VOLUME PER SESSION</div>
          <div class="big mono" style="color:${color}">${Math.round(volumeData[volumeData.length-1]).toLocaleString()}</div>
          ${sparklineSVG(volumeData, color)}
        </div>`;
      }
    }
  }
  return html;
}

// ── Rest timer float ────────────────────────────────────────────
function renderRestFloat() {
  if (state.restRemaining === null) return "";
  const color = state.colors[state.activeDay];
  if (state.restRemaining === 0) {
    return `<div class="rest-float">
      <div class="rest-done">
        <div style="font-size:26px;margin-bottom:4px">✅</div>
        <div class="mono" style="font-size:13px;color:#2EBF7A;font-weight:700">REST DONE</div>
        <div class="mono" style="font-size:12px;color:#666;margin-top:3px">${esc(state.lastLabel)}</div>
        <button class="btn-secondary" style="margin-top:10px;padding:8px 20px" data-action="rest-dismiss">Dismiss</button>
      </div>
    </div>`;
  }
  const ringColor = state.restRemaining<=5 ? "#E84A2E" : color;
  return `<div class="rest-float">
    <div class="rest-active">
      ${ringSVG(40, state.restRemaining/state.restDuration, ringColor, fmt(state.restRemaining))}
      <div class="rest-info">
        <div class="lbl mono">REST</div>
        <div class="name">${esc(state.lastLabel)}</div>
        <div class="rest-adjust">
          ${[-15,15].map(d => `<button class="adj-btn mono" data-action="rest-adjust" data-delta="${d}">${d>0?`+${d}`:d}</button>`).join("")}
        </div>
      </div>
      <button class="rest-close" data-action="rest-dismiss">✕</button>
    </div>
    <div class="rest-controls">
      <button data-action="rest-pause-toggle">${state.restRunning?"⏸ Pause":"▶ Resume"}</button>
      <button class="skip" data-action="rest-skip">Skip</button>
    </div>
  </div>`;
}

// ── Workout complete overlay ─────────────────────────────────────
function renderCompleteOverlay() {
  const di = state.activeDay;
  const day = PROGRAM[di];
  const color = state.colors[di];
  const totalSets = day.exercises.reduce((a,e) => a+e.sets, 0);
  const totalVolume = day.exercises.reduce((sum,ex,ei) => sum + calcVolume(di, ei, ex.sets), 0);
  const pairsCount = Math.ceil(day.exercises.length/2);
  const prExercises = day.exercises.filter((ex,ei) => Array.from({length:ex.sets},(_,s) => state.log[`${di}-${ei}-${s}`]?.isPR).some(Boolean));

  return `<div class="overlay">
    <div class="trophy">🏆</div>
    <div class="eyebrow2 mono" style="color:${color}">SESSION COMPLETE</div>
    <h2>${esc(day.title)}</h2>
    <div class="tag mono">${esc(day.tag)}</div>
    <div class="stat-grid">
      ${[{label:"SETS",value:totalSets},{label:"SUPERSETS",value:pairsCount},{label:"VOLUME",value:Math.round(totalVolume).toLocaleString()}].map(s => `
        <div class="stat-box"><div class="v" style="color:${color}">${s.value}</div><div class="l mono">${s.label}</div></div>
      `).join("")}
    </div>
    ${prExercises.length>0 ? `
      <div class="pr-box">
        <div class="h mono">🏆 NEW PRs</div>
        ${prExercises.map(ex => {
          const ei = day.exercises.indexOf(ex);
          const maxW = Math.max(...Array.from({length:ex.sets},(_,s) => parseFloat(state.log[`${di}-${ei}-${s}`]?.weight)||0));
          return `<div class="pr-row"><span>${ex.si+1}${ex.letter} ${esc(ex.name)}</span><span class="mono" style="color:#FFD700">${maxW}</span></div>`;
        }).join("")}
      </div>` : ""}
    <div class="overlay-actions">
      <button class="btn-primary" style="background:${color}" data-action="save-session">Save Session</button>
      <button class="btn-secondary" data-action="hide-complete">Keep Going</button>
    </div>
  </div>`;
}

// ── Color settings screen ───────────────────────────────────────
function renderColorScreen() {
  const editing = state.colorEditing;
  const local = state.localColors;
  const c = local[editing];
  return `<div class="color-screen">
    <div class="color-head">
      <div>
        <div class="mono" style="font-size:9px;letter-spacing:4px;color:#555">CUSTOMIZE</div>
        <div style="font-size:20px;font-weight:900;letter-spacing:-1px">DAY COLORS</div>
      </div>
      <button class="done-color-btn" data-action="save-colors">Done</button>
    </div>
    <div class="color-body">
      <div class="color-daytabs">
        ${PROGRAM.map((d,i) => `
          <button class="color-daytab ${editing===i?"active":""}" style="${editing===i?`border-color:${local[i]}`:""}" data-action="color-select-day" data-day="${i}">
            <div class="swatch-dot" style="background:${local[i]}"></div>
            <span class="mono" style="font-size:9px;color:${editing===i?"#f0ede8":"#666"}">${esc(d.title.split(" ").pop())}</span>
          </button>
        `).join("")}
      </div>
      <div class="color-preview" style="border-color:${c}">
        <div class="mono" style="font-size:9px;letter-spacing:4px;color:${c};margin-bottom:6px">${PROGRAM[editing].label}</div>
        <div style="font-size:22px;font-weight:900;color:${c};margin-bottom:10px">${esc(PROGRAM[editing].title)}</div>
        <div class="preview-pills">
          ${PROGRAM[editing].exercises.slice(0,3).map(ex => `<div class="preview-pill" style="background:${c}15">${ex.si+1}${ex.letter}</div>`).join("")}
        </div>
      </div>
      <div class="mono" style="font-size:9px;letter-spacing:3px;color:#555;margin-bottom:10px">PRESET COLORS</div>
      <div class="swatch-grid">
        ${COLOR_PRESETS.map(pc => `<button class="swatch ${local[editing]===pc?"selected":""}" style="background:${pc}" data-action="color-pick" data-color="${pc}"></button>`).join("")}
      </div>
      <div class="mono" style="font-size:9px;letter-spacing:3px;color:#555;margin-bottom:10px">CUSTOM HEX</div>
      <div class="hex-row">
        <div class="hex-preview" style="background:${c}"></div>
        <input class="hex-input mono" type="text" placeholder="#E84A2E" value="${esc(c)}" data-key="hex" data-role="hexfield">
      </div>
      <button class="reset-btn mono" data-action="color-reset">RESET TO DEFAULT</button>
    </div>
  </div>`;
}

// ── Bottom nav ───────────────────────────────────────────────────
function renderBottomNav() {
  const color = state.colors[state.activeDay];
  return `<div class="bottom-nav">
    <button class="nav-btn ${state.activeTab==='workout'?"active":""}" style="${state.activeTab==='workout'?`color:${color}`:""}" data-action="switch-tab" data-tab="workout">
      <span class="nav-ic">🏋️</span><div>WORKOUT</div>
    </button>
    <button class="nav-btn ${state.activeTab==='log'?"active":""}" style="${state.activeTab==='log'?`color:${color}`:""}" data-action="switch-tab" data-tab="log">
      <span class="nav-ic">📋</span><div>LOG</div>
      ${state.history.length>0 ? `<div class="nav-badge" style="background:${color}">${state.history.length}</div>` : ""}
    </button>
  </div>`;
}

// ── Business logic ──────────────────────────────────────────────
function startRest(label) {
  state.lastLabel = label;
  state.restRemaining = state.restDuration;
  state.restRunning = true;
}

function toggleDone(logKey, label, di, ei, s) {
  const wasUndone = !state.log[logKey].done;
  state.log[logKey] = { ...state.log[logKey], done: !state.log[logKey].done };

  if (wasUndone) {
    const ex = PROGRAM[di].exercises[ei];
    const w = parseFloat(state.log[logKey].weight) || 0;
    const r = parseFloat(state.log[logKey].reps) || 0;
    const vol = w*r;
    const prKey = `${di}-${ei}`;
    const existing = state.prs[prKey];
    const isWeightPR = w>0 && (!existing || w>existing.weight);
    const isVolPR = vol>0 && (!existing || vol>existing.volume);
    if (isWeightPR || isVolPR) {
      state.prs[prKey] = { weight: Math.max(w, existing?.weight||0), volume: Math.max(vol, existing?.volume||0) };
      state.log[logKey].isPR = true;
    }

    if (ex.letter === "B") {
      startRest(label);
      const exA = PROGRAM[di].exercises[ei-1];
      const allPairDone = Array.from({length:ex.sets},(_,ss) => state.log[`${di}-${ei}-${ss}`]?.done).every(Boolean)
        && Array.from({length:exA.sets},(_,ss) => state.log[`${di}-${ei-1}-${ss}`]?.done).every(Boolean);
      if (allPairDone) {
        const nextSI = ex.si + 1;
        const nextPairStart = PROGRAM[di].exercises.findIndex(e => e.si === nextSI);
        if (nextPairStart !== -1) {
          setTimeout(() => {
            state.expandedSS = `${di}-${nextSI}`;
            render();
            const elx = document.getElementById(`ss-${di}-${nextSI}`);
            if (elx) elx.scrollIntoView({ behavior:"smooth", block:"center" });
          }, 350);
        }
      }
    }

    // auto-show completion overlay once the whole day just finished
    const totalSets = PROGRAM[di].exercises.reduce((a,e) => a+e.sets, 0);
    const doneTotalSets = PROGRAM[di].exercises.reduce((sum,exx,eix) => sum + getExProgress(di, eix, exx.sets), 0);
    if (doneTotalSets===totalSets && totalSets>0) {
      setTimeout(() => { state.showComplete = true; render(); }, 500);
    }
  }

  saveState();
  render();
}

function switchDay(i) {
  state.activeDay = i;
  state.expandedSS = `${i}-0`;
  state.showComplete = false;
  render();
}

function saveSession() {
  const di = state.activeDay;
  const d = PROGRAM[di];
  const now = new Date();
  const dateStr = now.toLocaleDateString("en-US", { weekday:"short", month:"short", day:"numeric" });
  const exercises = d.exercises.map((ex, ei) => ({
    name: ex.name, si: ex.si, letter: ex.letter,
    isPR: Array.from({length:ex.sets},(_,s) => state.log[`${di}-${ei}-${s}`]?.isPR).some(Boolean),
    note: state.notes[`${di}-${ex.si}`] || "",
    sets: Array.from({length:ex.sets},(_,s) => ({ ...state.log[`${di}-${ei}-${s}`] })),
  }));
  const setsCompleted = exercises.reduce((a,ex) => a+ex.sets.filter(s=>s.done).length, 0);
  const vol = exercises.reduce((a,ex) => a+ex.sets.reduce((b,s) => b+((parseFloat(s.weight)||0)*(parseFloat(s.reps)||0)),0), 0);
  const prCount = exercises.filter(ex => ex.isPR).length;
  state.history.push({ id:Date.now(), dayIndex:di, date:dateStr, exercises, setsCompleted, totalVolume:vol, prs:prCount });
  state.showComplete = false;
  state.activeTab = "log";
  saveState();
  render();
}

// ── Render loop with focus preservation ─────────────────────────
const appEl = document.getElementById("app");
let renderTimer = null;
function scheduleRender(delay=200) {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(render, delay);
}

function buildAppHTML() {
  let html = state.activeTab === "workout" ? renderWorkoutTab() : renderLogTab();
  html += renderBottomNav();
  html += renderRestFloat();
  if (state.showComplete) html += renderCompleteOverlay();
  if (state.showColorSettings) html += renderColorScreen();
  return html;
}

function render() {
  document.documentElement.style.setProperty("--accent", state.colors[state.activeDay]);
  const active = document.activeElement;
  let restoreKey = null, restoreSel = null;
  if (active && active.dataset && active.dataset.key && appEl.contains(active)) {
    restoreKey = active.dataset.key;
    restoreSel = [active.selectionStart, active.selectionEnd];
  }
  appEl.innerHTML = buildAppHTML();
  if (restoreKey) {
    const el2 = appEl.querySelector(`[data-key="${CSS.escape(restoreKey)}"]`);
    if (el2) {
      el2.focus();
      try { el2.setSelectionRange(restoreSel[0], restoreSel[1]); } catch (e) {}
    }
  }
}

// ── Event delegation ────────────────────────────────────────────
appEl.addEventListener("click", (e) => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const a = btn.dataset.action;
  if (a === "switch-tab") { state.activeTab = btn.dataset.tab; render(); }
  else if (a === "switch-day") { switchDay(parseInt(btn.dataset.day)); }
  else if (a === "toggle-ss") { const k = btn.dataset.key; state.expandedSS = state.expandedSS===k?null:k; render(); }
  else if (a === "toggle-done") { toggleDone(btn.dataset.logkey, btn.dataset.label, parseInt(btn.dataset.di), parseInt(btn.dataset.ei), parseInt(btn.dataset.s)); }
  else if (a === "set-rest") { state.restDuration = parseInt(btn.dataset.value); saveState(); render(); }
  else if (a === "open-colors") { state.showColorSettings = true; state.localColors = [...state.colors]; state.colorEditing = state.activeDay; render(); }
  else if (a === "close-colors") { state.showColorSettings = false; state.localColors = null; render(); }
  else if (a === "save-colors") { state.colors = [...state.localColors]; state.showColorSettings = false; state.localColors = null; saveState(); render(); }
  else if (a === "color-select-day") { state.colorEditing = parseInt(btn.dataset.day); render(); }
  else if (a === "color-pick") { state.localColors[state.colorEditing] = btn.dataset.color; render(); }
  else if (a === "color-reset") { state.localColors = [...DEFAULT_COLORS]; render(); }
  else if (a === "show-complete") { state.showComplete = true; render(); }
  else if (a === "hide-complete") { state.showComplete = false; render(); }
  else if (a === "save-session") { saveSession(); }
  else if (a === "rest-adjust") { state.restRemaining = Math.max(5, (state.restRemaining||0)+parseInt(btn.dataset.delta)); render(); }
  else if (a === "rest-pause-toggle") { state.restRunning = !state.restRunning; render(); }
  else if (a === "rest-skip" || a === "rest-dismiss") { state.restRunning = false; state.restRemaining = null; render(); }
  else if (a === "clear-history") { if (confirm("Clear all session history? This cannot be undone.")) { state.history = []; saveState(); render(); } }
  else if (a === "log-view") { state.logView = btn.dataset.view; render(); }
  else if (a === "log-filter") { const v = btn.dataset.day; state.logFilter = v==="all" ? null : parseInt(v); render(); }
  else if (a === "chart-day") { state.chartDay = parseInt(btn.dataset.day); state.chartEx = 0; render(); }
  else if (a === "chart-ex") { state.chartEx = parseInt(btn.dataset.ex); render(); }
});

appEl.addEventListener("input", (e) => {
  const t = e.target;
  if (t.dataset.role === "setfield") {
    const key = t.dataset.logkey, field = t.dataset.field;
    state.log[key] = { ...state.log[key], [field]: t.value };
    saveState();
    scheduleRender(250);
  } else if (t.dataset.role === "notefield") {
    state.notes[t.dataset.noteskey] = t.value;
    saveState();
    scheduleRender(400);
  } else if (t.dataset.role === "hexfield") {
    const v = t.value;
    if (/^#[0-9A-Fa-f]{0,6}$/.test(v)) { state.localColors[state.colorEditing] = v; scheduleRender(200); }
  }
});

// ── Rest timer tick ─────────────────────────────────────────────
setInterval(() => {
  if (state.restRunning && state.restRemaining > 0) {
    state.restRemaining -= 1;
    if (state.restRemaining <= 0) { state.restRunning = false; playBeep("done"); }
    else if (state.restRemaining <= 3) playBeep("tick");
    render();
  }
}, 1000);

// ── Init ─────────────────────────────────────────────────────────
render();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
